name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.21.7"

      - name: Run tests
        run: dagger call test --source . --show-output

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.21.7"

      - name: Run linter
        run: dagger call lint --source .

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.21.7"

      - name: Build
        run: dagger call build-only --source . --version "dev"

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.21.7"

      - name: Run tests with coverage
        run: dagger call coverage --source . export --path ./coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@f2274c2c340e0c81c8f7dc407b2a477b8935f171 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: true

      - name: Generate JUnit XML test results
        if: ${{ !cancelled() }}
        run: go run gotest.tools/gotestsum@latest --junitfile junit.xml ./...

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run pinned security scans
        run: just security
