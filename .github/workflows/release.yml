name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name }},homebrew-tap"
          permission-contents: write
          permission-packages: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Dagger
        uses: dagger/dagger-for-github@057a749131c864e4a719e6773baf0d1447ef998f # v7
        with:
          version: "0.21.7"

      - name: Run Dagger Release Pipeline
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          dagger call release \
            --source=. \
            --version="$VERSION_TAG" \
            --github-token=env:GITHUB_TOKEN \
            --npm-oidc-token-url="$ACTIONS_ID_TOKEN_REQUEST_URL" \
            --npm-oidc-token=env:ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            --docker-registry=ghcr.io/natonathan/shipyard \
            --docker-username=${{ github.repository_owner }}
